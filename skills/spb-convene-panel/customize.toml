# spb-convene-panel — workflow customization surface
#
# Layered base → team → user merge per BMad convention:
#   - base:     this file
#   - team:     {project-root}/_bmad/custom/spb-convene-panel.toml
#   - personal: {project-root}/_bmad/custom/spb-convene-panel.user.toml
#
# Merge rules:
#   scalars: override wins • arrays: append • arrays-of-tables (code/id keyed): replace then append.
#
# Resolve via {project-root}/_bmad/scripts/resolve_customization.py.

[workflow]

# --- Activation hooks --------------------------------------------------------
activation_steps_prepend = []
activation_steps_append = []

# --- Persistent facts (loaded every run) ------------------------------------
persistent_facts = [
  "file:{project-root}/sp-v1-0-0-contract/spec.md",
  "file:{project-root}/sp-v1-0-0-contract/launch-plan.md",
]

# --- RP-specific defaults (DESIGN-3 §4 overlay) -----------------------------

# Default panel size. RP floor 12, suggested ceiling 40.
default_size = 16
allowed_size_range = [12, 40]

# Pack defaults. Empty = pick per-decision per audience-matching rules.
default_pack = ""
panel_template = ""

# Readback lede: for RP the frame IS the lede.
readback_lede_template = "{decision_being_informed}"
small_n_floor_class = "rp"

# When convergence < this threshold AND suggest_extend_on_low_convergence,
# Stage 7 ends with a soft nudge offering spb-extend-panel on the cleavage.
# Auto-invoke is intentionally disabled; the user opts in.
suggest_extend_on_low_convergence = true
extend_suggestion_threshold = 0.45

# --- Output paths (DESIGN-3 §2 cross-cutting) -------------------------------
verdict_output_path = "{project-root}/_bmad/synthpanel/verdicts/{run_id}.json"
readback_card_path = "{project-root}/_bmad/synthpanel/cards/{run_id}.md"

# Optional shell hook fired after Stage 7 completes.
on_complete = ""
